prompt = """
# sb-oneshot — 기능 설명 → 구현 완료 전 자동 파이프라인

**사용법**: `/sb-oneshot [기능 설명]`

**예시**:
```
/sb-oneshot 사용자가 음식을 검색해서 끼니별로 기록하고 하루 칼로리를 확인하는 식단 기록 기능
```

기능 설명 하나만 입력하면 개발 계획 → 구현 → 갭 분석 → 브라우저 검증까지
**6단계를 자동으로 완주**합니다.

---

## 실행 전 체크 (자동)

파이프라인 시작 전 아래를 확인합니다:

1. **헌법 확인**: `constitution.md` 존재 여부
   - 없으면 → **즉시 중단** 후 안내:
     ```
     ⚠️  constitution.md 파일이 없습니다.
     sb-flow setup을 다시 실행하거나 constitution.md를 프로젝트 루트에 복사해주세요.
     ```

2. **기능 설명 확인**: `$ARGUMENTS`가 비어있으면 → 안내:
   ```
   기능 설명을 입력해주세요.
   사용법: /sb-oneshot [만들고 싶은 기능 설명]
   예시: /sb-oneshot 사용자 로그인 및 회원가입 기능
   ```

3. **입력 자산 감지**: 먼저 아래를 출력합니다: `⏳ [0/6] 입력 자산 감지 중...`
   그 후 아래 경로에서 파일을 탐색하여 기록합니다:

   | 자산 | 탐색 경로 | 필수 | 용도 |
   |------|----------|------|------|
   | **헌법** | `constitution.md` | **필수** | 개발 원칙 — 모든 구현의 최우선 기준 |
   | **디자인 시스템** | `designs/design.md` + `designs/design-tokens.css` | **필수** | 시각적 값의 절대 기준 — 모든 UI 수치는 이 토큰으로 구현 |
   | **PRD** | `prd/` 폴더 안의 모든 `.md` 파일 | 선택 | 기능 요구사항 원본 |
   | **디자인 화면** | `designs/` 폴더 안의 모든 `.pen` 파일 | 선택 | UI 구조·배치 원본 |

   - **헌법 + 디자인 시스템** 중 하나라도 없으면 → **즉시 중단** 후 해당 파일 안내
   - `prd/` 폴더가 비어있거나 없으면 PRD → `—` 표시 후 계속
   - `designs/` 폴더에 .pen 파일이 없으면 디자인 화면 → `—` 표시 후 계속
   - **파일이 여러 개인 경우** → **멈추고 사용자에게 선택 요청**

   감지 결과 보고:
   ```
   [0/6] 입력 자산 감지 완료
     헌법: constitution.md ✅
     디자인 시스템: design.md ✅ + design-tokens.css ✅
     PRD: prd/요구사항.md ✅  (또는 —)
     디자인 화면(.pen): designs/화면.pen ✅  (또는 —)
   ```

---

## 파이프라인 실행 순서 (6단계 자동 실행)

> **진행 상황 출력 규칙 (필수)**: 각 단계를 시작하기 전 반드시 아래 형식을 텍스트로 출력합니다.
> ```
> ⏳ [N/6] 단계명 시작...
> ```
> 단계 완료 후에는:
> ```
> ✅ [N/6] 단계명 완료
> ```

**멈추는 경우는 아래 한 가지뿐입니다:**
- Playwright 서버 확인에서 개발 서버가 실행 중이 아닌 경우

---

### [1/6] 개발 계획 — `/pdca plan`

> 🔔 **출력**: `⏳ [1/6] 개발 계획 시작...`

**아래 명령어를 기능명만 바꿔서 그대로 실행합니다** (추가·변경·생략 금지):

**PRD가 감지된 경우:**
```
/pdca plan {기능명}
constitution.md 파일을 읽고 모든 원칙(제0조~마지막 조항)을 반드시 준수해서 개발 계획을 세워줘.
designs/design.md와 designs/design-tokens.css를 읽고, 모든 색상·크기·간격·그림자·둥글기는 design-tokens.css의 CSS 변수를 사용해줘. 하드코딩 금지.
@vercel-react-best-practices 가이드라인을 읽고 이 기준에 맞춰 개발 계획을 세워줘.
아래 PRD 문서를 기능 요구사항의 원본으로 참조해서 모든 요구사항을 빠짐없이 반영해줘:
@{prd/ 폴더 내 감지된 PRD 파일 경로}
```

**디자인 화면(.pen)이 감지된 경우**, 위 명령어에 아래를 추가:
```
Pencil MCP 도구(batch_get)로 아래 .pen 파일의 화면 구성과 컴포넌트를 읽고 UI 흐름을 개발 계획에 반영해줘.
⚠️ .pen의 레이아웃·배치는 따르되, 시각적 수치(높이·색상·폰트·간격)는 반드시 design.md 토큰 기준으로 교정해줘.
@{designs/ 폴더 내 감지된 .pen 파일 경로}
```

**PRD·디자인 모두 없는 경우:**
```
/pdca plan {기능명}
constitution.md 파일을 읽고 모든 원칙(제0조~마지막 조항)을 반드시 준수해서 개발 계획을 세워줘.
designs/design.md와 designs/design-tokens.css를 읽고, 모든 색상·크기·간격·그림자·둥글기는 design-tokens.css의 CSS 변수를 사용해줘. 하드코딩 금지.
@vercel-react-best-practices 가이드라인을 읽고 이 기준에 맞춰 개발 계획을 세워줘.
기능 설명: {$ARGUMENTS}
```

완료 후 `docs/01-plan/features/기능명.plan.md` 생성 확인

---

### [2/6] 상세 설계 — `/pdca design`

> 🔔 **출력**: `⏳ [2/6] 상세 설계 시작...`

**아래 명령어를 기능명만 바꿔서 그대로 실행합니다** (추가·변경·생략 금지):

```
/pdca design {기능명}
constitution.md 파일을 읽고 모든 원칙을 준수해서 상세 설계를 작성해줘.
designs/design.md와 designs/design-tokens.css를 읽고, 모든 UI 컴포넌트의 시각적 수치(높이·색상·폰트·간격·그림자·둥글기)를 design-tokens.css 변수로 명시해줘. 하드코딩 금지.
@vercel-react-best-practices 가이드라인을 읽고 이 기준에 맞춰 상세 설계를 작성해줘.
```

완료 후 `docs/02-design/features/기능명.design.md` 생성 확인

---

### [3/6] 코드 구현 — `/pdca do`

> 🔔 **출력**: `⏳ [3/6] 코드 구현 시작...`

**아래 명령어를 기능명만 바꿔서 그대로 실행합니다** (추가·변경·생략 금지):

```
/pdca do {기능명}
constitution.md 파일을 읽고 모든 원칙을 반드시 준수해서 구현해줘. 특히 TypeScript Strict Mode, 보안(API 키 하드코딩 금지), 빌드 검증.
designs/design.md와 designs/design-tokens.css를 읽고, 모든 CSS 스타일링에서 var(--토큰명) 형태로 참조해줘. 하드코딩 금지.
@vercel-react-best-practices 가이드라인을 읽고 이 기준에 맞춰 구현해줘.
```

---

### [4/6] 갭 분석 + 디자인 토큰 검증 — `/pdca analyze`

> 🔔 **출력**: `⏳ [4/6] 갭 분석 + 디자인 토큰 검증 시작...`

```
/pdca analyze {기능명}
```

갭 분석 완료 후, **디자인 토큰 적용 검증**을 추가로 수행합니다:

`designs/design.md`와 `designs/design-tokens.css`를 기준으로 구현된 코드를 검증합니다:

| 검증 항목 | 기준 | 판정 |
|----------|------|------|
| 색상 하드코딩 | `color: #hex` 형태 없음 → 모두 `var(--color-*)` | ✅ / ⚠️ |
| 크기 하드코딩 | px 고정값 없음 → 모두 `var(--space-*)`, `var(--text-*)` 등 | ✅ / ⚠️ |
| 레이아웃 토큰 | navbar, sidebar 등 `var(--navbar-height)` 등 사용 | ✅ / ⚠️ |
| 반응형 | 모바일 375px 이상 정상 표시 | ✅ / ⚠️ |

갭 분석 Match Rate를 기록합니다. 자동 개선이 필요하면 다음 단계([5/6])에서 처리합니다.

---

### [5/6] 자동 개선 — `/pdca iterate`

> 🔔 **출력**: `⏳ [5/6] 자동 개선 시작...`

4단계 갭 분석 결과에 따라 자동 판단합니다:

**Match Rate ≥ 90%** → `✅ [5/6] 자동 개선 패스 (Match Rate 충족)` 후 바로 6단계로 진행

**Match Rate < 90%** → 아래를 실행합니다:

```
/pdca iterate {기능명}
```

iterate 완료 후:
- 개선된 Match Rate를 확인합니다
- Match Rate ≥ 90% → 6단계로 진행
- Match Rate < 90% (2회 이상 반복 후에도) → **멈추고 안내**:
  ```
  ⚠️  자동 개선 후에도 Match Rate가 [N]%입니다.

  선택 A (권장): 사용자가 직접 확인 후 /sb-guide 로 계속
  선택 B: 이 상태로 6단계(브라우저 검증)로 진행
  ```

---

### [6/6] 브라우저 기능·디자인 검증 + 자체 수정

> 🔔 **출력**: `⏳ [6/6] 브라우저 검증 시작...`

`browser_subagent` 도구를 사용하여 실제 브라우저에서 구현된 화면을 직접 확인하고 문제를 즉시 수정합니다.

**검증 절차:**

1. **개발 서버 확인**: `run_shell_command`로 `npm run dev`를 `is_background: true` 옵션으로 실행합니다. (포트 3000번 대기)
   - 서버가 이미 실행 중이면 생략합니다
   - 서버 실행이 불가능한 경우 → **멈추고 안내**:
     ```
     ℹ️  개발 서버가 필요합니다.
     터미널에서 npm run dev 를 실행한 후 "계속"을 입력해주세요.
     ```

2. **화면 탐색 및 스크린샷 수집**: 구현된 모든 주요 화면을 순서대로 방문하고 캡처합니다

3. **기능 검증**: 핵심 기능을 직접 테스트합니다 (버튼 클릭, 폼 입력, 페이지 이동)

4. **디자인 검증**: 스크린샷을 `designs/design.md` 기준으로 분석합니다
   - 레이아웃 깨짐, 토큰 미적용(하드코딩 색상·크기) 여부
   - design-tokens.css 변수가 의도대로 적용됐는지 확인

5. **자체 수정**: 발견된 문제를 즉시 코드 수정 후 재검증합니다

6. **검증 결과 출력**:
   ```
   [6/6] 브라우저 검증 결과
     화면 수: [N]개
     기능 검증: ✅ [N]개 통과 / ⚠️ [N]개 수정됨
     디자인 검증: ✅ [N]개 통과 / ⚠️ [N]개 수정됨
     수정된 파일: [수정 파일 목록]
   ```

