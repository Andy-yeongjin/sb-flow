prompt = """
# sb-guide — 현재 단계 파악 & 다음 단계 안내

현재 프로젝트의 개발 단계를 자동으로 감지하고, 다음 실행할 명령어를 안내합니다.
처음 사용자도 이 명령어 하나로 어디서부터 시작해야 할지 알 수 있습니다.

---

## 실행 지시사항

### Step 1: 파일 존재 여부 확인

아래 파일/디렉토리를 순서대로 확인합니다:

```
[ ] .specify/memory/constitution.md    — 헌법 (1단계 완료 여부)
[ ] specs/ 디렉토리                    — SpecKit feature 폴더
[ ] specs/*/spec.md                    — 기능 명세서 (2단계)
[ ] specs/*/plan.md                    — 기술 설계 (4단계)
[ ] specs/*/tasks.md                   — 태스크 분해 (5단계)
[ ] SPEC_CONTEXT.md (내용이 채워짐)    — 브릿지 문서 (7.5단계)
[ ] docs/01-plan/                      — PDCA 개발 계획 (8단계)
[ ] docs/02-design/                    — PDCA 상세 설계 (9단계)
[ ] src/ 또는 app/ (소스코드 존재)     — 구현 시작 (10단계)
[ ] docs/archive/                      — 세션 아카이브 (16.5단계)
[ ] SPEC_CONTEXT.md 태스크 현황 최신화  — 문서 동기화 (17단계)
```

### Step 2: 현재 단계 판단 로직

아래 순서대로 판단하여 **가장 최근 완료된 단계**를 식별합니다:

| 조건 | 현재 상태 | 다음 실행 |
|------|----------|----------|
| constitution.md 없음 | 🆕 새 프로젝트 시작 전 | `/speckit.constitution` |
| constitution만 있음 | ✅ 1단계 완료 | `/speckit.specify [기능설명]` |
| spec.md 있음 + `[NEEDS CLARIFICATION]` 포함 | ⚠️ 2단계 완료 (모호성 있음) | `/speckit.clarify` |
| spec.md 있음 + clarification 없음 | ✅ 2단계 완료 | `/speckit.plan` |
| spec.md + plan.md 있음, tasks.md 없음 | ✅ 4단계 완료 | `/speckit.tasks` |
| tasks.md 있음, SPEC_CONTEXT.md 비어있거나 없음 | ✅ 5단계 완료 | `/sb-bridge specs/NNN-기능명` |
| SPEC_CONTEXT.md 채워짐, docs/01-plan 없음 | ✅ 7.5단계 완료 | 아래 8단계 명령어 참조 |
| docs/01-plan 있음, docs/02-design 없음 | ✅ 8단계 완료 | 아래 9단계 명령어 참조 |
| docs/02-design 있음, 소스코드 미완 | ✅ 9단계 완료 | 아래 10단계 명령어 참조 |
| 소스코드 있음, 코드 리뷰 없음 | ✅ 10단계 완료 | `/code-review` (선택) |
| 코드 리뷰 완료, gap 분석 없음 | ✅ 11단계 완료 | 아래 12단계 명령어 참조 |
| gap 분석 있음 (Match Rate < 90%) | ⚠️ 12단계 완료, 개선 필요 | 아래 13단계 명령어 참조 |
| gap 분석 완료 (Match Rate ≥ 90%) | ✅ 12단계 완료 | `/zero-script-qa` (선택) |
| QA 검증 완료 (또는 건너뜀) | ✅ 14단계 완료 | 아래 15단계 명령어 참조 |
| simplify 완료 | ✅ 15단계 완료 | 아래 16단계 명령어 참조 |
| 완료 보고서 생성됨 | ✅ 16단계 완료 | 아래 16.5단계 명령어 참조 |
| 세션 아카이브 완료 (또는 건너뜀) | ✅ 16.5단계 완료 | 아래 17단계 명령어 참조 |
| 문서 사후 동기화 완료 | ✅ 17단계 완료 | 🎉 전체 사이클 완료! |

**단계별 실행 명령어 (복사해서 사용)**

8단계 — 개발 계획:
```
/pdca plan {기능명}
SPEC_CONTEXT.md 파일을 참조해서 개발 계획을 세워줘.
@vercel-react-best-practices 가이드라인을 읽고 이 기준에 맞춰 개발 계획을 세워줘.
다음 세 가지 기준을 반드시 지켜야 해:
1. 헌법(constitution)의 모든 원칙을 준수할 것
2. spec.md의 모든 기능 요구사항(FR)을 빠짐없이 구현할 것
3. tasks.md의 모든 태스크를 완료 기준으로 삼을 것
```

9단계 — 상세 설계:
```
/pdca design {기능명}
SPEC_CONTEXT.md 파일을 참조해서 작업해줘.
@vercel-react-best-practices 가이드라인을 읽고 이 기준에 맞춰 상세 설계를 작성해줘.
```

10단계 — 코드 구현:
```
/pdca do {기능명}
SPEC_CONTEXT.md 파일을 참조해서 작업해줘.
@vercel-react-best-practices 가이드라인을 읽고 이 기준에 맞춰 구현해줘.
```

11단계 — 코드 리뷰 (선택):
```
/code-review
```

12단계 — Gap 분석:
```
/pdca analyze {기능명}
```

13단계 — 자동 개선 (Match Rate < 90%):
```
/pdca iterate {기능명}
```

14단계 — QA 검증 (선택):
```
/zero-script-qa
```

15단계 — 코드 정리 (Match Rate ≥ 90%):
```
/simplify
```

16단계 — 완료 보고서:
```
/pdca report {기능명}
```

16.5단계 — 세션 아카이브 (권장):
```
/pdca archive {기능명}
```

17단계 — 문서 사후 동기화:
```
/sb-sync
```

### Step 3: 단계별 세부 안내

감지된 단계에 따라 아래 내용을 포함하여 안내합니다:

1. **현재 위치**: 몇 단계인지, 어떤 프레임워크(SpecKit/bkit) 구간인지
2. **완료된 산출물**: 이미 생성된 파일 목록
3. **다음 단계 설명**: 왜 이 단계인지, 무엇이 생성되는지
4. **실행 명령어**: 복사해서 바로 쓸 수 있는 완성된 명령어
5. **주의사항**: 해당 단계에서 특히 주의할 점

---

## 출력 형식

아래 형식으로 출력합니다:

```
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📍 현재 단계: [N단계. 단계명]
   구간: [🅰 설계(SpecKit) / 🅱 구현(bkit) / 🅲 검증·보고(bkit) / 🅳 동기화]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📁 완료된 산출물:
  ✅ [파일/단계명]
  ✅ [파일/단계명]

⏭️  다음 단계: [N+1단계. 다음 단계명]
   [다음 단계가 무엇을 하는지 1~2줄 설명]

🔧 실행 명령어:
┌─────────────────────────────────────
│ [복사 가능한 완성된 명령어]
└─────────────────────────────────────

💡 참고사항:
  • [주의사항 또는 선택적 단계 안내]
  • [필요한 경우 선행 작업 안내]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
```

---

## 초보자용 단계 설명 (단계별 포함할 추가 설명)

단계별로 아래 설명을 함께 제공합니다:

**SpecKit 구간 (1~7.5단계)**:
> "아직 코드를 작성하지 않습니다. '무엇을, 왜 만드는지'를 완전히 정의하는 설계 단계입니다."

**bkit 구현 구간 (8~10.5단계)**:
> "설계가 완료됐으므로 이제 실제 코드를 작성합니다. SPEC_CONTEXT.md를 반드시 참조해야 합니다."

**bkit 검증·보고 구간 (11~16.5단계)**:
> "구현이 설계대로 됐는지 검증하고, 미흡한 부분을 자동으로 개선한 뒤 보고서를 작성하고 아카이브합니다."

**동기화 구간 (17단계)**:
> "현재 코드를 기준으로 SpecKit 문서를 역방향 동기화하고 SPEC_CONTEXT.md를 최신화합니다."

---

## 특수 상황 처리

**여러 feature spec이 동시에 존재하는 경우**:
가장 최근 수정된 feature 폴더를 기준으로 판단하고, 다른 feature 폴더도 목록으로 보여줍니다.

**SPEC_CONTEXT.md가 있지만 내용이 기본 템플릿 상태인 경우**:
"SPEC_CONTEXT.md가 비어있습니다. `/sb-bridge specs/NNN-기능명` 으로 내용을 채워주세요." 라고 안내합니다.

**앞 단계를 건너뛴 것 같은 경우**:
경고 메시지를 표시하고 "건너뛴 단계를 실행하지 않으면 이후 단계에서 오류가 발생할 수 있습니다" 라고 안내합니다.
"""
