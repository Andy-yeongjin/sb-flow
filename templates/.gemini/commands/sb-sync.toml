prompt = """
# sb-sync — 구현 완료 후 문서 자동 동기화

`/sb-oneshot` 또는 대화형 개발 완료 후, 실제 구현 내용을 모든 문서에 반영합니다.

---

## 실행 전 확인

`SPEC_CONTEXT.md`를 읽어 현재 기능명과 spec 경로를 파악합니다.

---

## 동기화 순서 (자동 실행)

### [1/4] bkit plan/design 문서 동기화

이번 대화에서 코드에 적용된 변경 사항을 파악하여 자동으로 처리합니다.

| 변경 유형 | 처리 |
|-----------|------|
| 마이너 UI (색상, 여백, 텍스트) | 건너뜀 |
| 로직·UX 변경 | `docs/02-design/features/기능명.design.md` 업데이트 |
| 신규 기능 추가 | `docs/01-plan/features/기능명.plan.md` + `docs/02-design/features/기능명.design.md` 업데이트 |

---

### [2/4] SpecKit 문서 동기화 (tasks.md + spec.md)

`specs/NNN-기능명/` 경로를 확인합니다.

**경로가 있는 경우 (sb-oneshot 경유):**

현재 구현된 코드와 원래 `specs/NNN-기능명/`을 비교해서 아래 네 가지를 모두 처리하고 `spec.md`, `tasks.md`를 업데이트합니다:

1. 완료된 기존 태스크: `[ ]` → `[x]`
2. 수정된 기존 기능: 해당 FR을 실제 구현에 맞게 업데이트 (FR 번호 유지, `<!-- 변경: ... -->` 주석 추가)
3. 새로 추가된 기능: `spec.md`에 새 FR 추가 + `tasks.md`에 새 태스크 추가 후 `[x]`
4. 제거된 기능: 해당 FR에 `deprecated` 표시

**경로가 없는 경우 (`/pdca plan` 직접 사용):**

건너뜀 — [3/4]에서 SPEC_CONTEXT.md만 업데이트합니다.

---

### [3/4] SPEC_CONTEXT.md 갱신

업데이트된 `spec.md`와 `tasks.md` (또는 대화 맥락)를 반영해서 SPEC_CONTEXT.md의 아래 섹션을 갱신합니다:

- **기능 명세 요약**: 변경·추가된 FR 반영
- **태스크 현황**: 완료 체크박스 + 총 개수
- **현재 상태**: `In Progress` → `Completed`

---

### [4/4] SpecKit 문서 일관성 검증

`specs/` 경로가 있는 경우 자동 실행합니다:
```
/speckit.analyze
```

spec.md ↔ plan.md ↔ tasks.md 간 최종 일관성을 확인합니다.

`specs/` 경로가 없는 경우 (bkit 직접 사용) 건너뜁니다.

---

## 완료 보고

```
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
✅ sb-sync 완료
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

동기화된 파일:
  [업데이트된 파일 목록]

주요 변경사항:
  [케이스별 요약: 완료 태스크 N개, 추가 FR N개 등]

다음:
  → 갭 분석:    /pdca analyze {기능명}
  → 보고서:     /pdca report {기능명}
  → 새 기능:    /sb-oneshot [기능 설명]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
```
"""
